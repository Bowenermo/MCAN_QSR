# Network
MODEL_USE: mcan_cmx_gridppm

# MCAN language-fusion backbone
LAYER: 6
HIDDEN_SIZE: 512
FF_SIZE: 2048
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 1024

# Raw image + ConvMixer + GridPPM-Lite
USE_RAW_IMAGE_INPUT: True
RAW_IMAGE_INPUT_SIZE: 224
RAW_IMAGE_MEAN: [0.485, 0.456, 0.406]
RAW_IMAGE_STD: [0.229, 0.224, 0.225]
CMX_MODEL_NAME: convmixer_768_32
CMX_PRETRAINED: True
CMX_GRAD_CHECKPOINT: True
CMX_FUSE_POOL_SIZE: 14
CMX_POS_DIM: 5
CMX_POS_HIDDEN: 256
CMX_USE_BN: True
CMX_FREEZE_BACKBONE_EPOCHS: 2
VISION_LR_SCALE: 0.25

# Keep bbox branch disabled
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False
SKIP_BAD_FEAT: True
USE_AMP: True

# Fast training defaults
BATCH_SIZE: 64
NUM_WORKERS: 24
PERSISTENT_WORKERS: True
PREFETCH_FACTOR: 6
VERBOSE: True
LR_BASE: 0.00008
LR_DECAY_R: 0.2
LR_DECAY_LIST: [2]
WARMUP_EPOCH: 1
MAX_EPOCH: 3
GRAD_NORM_CLIP: 1.0
GRAD_ACCU_STEPS: 1
LOSS_FUNC: bce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9'}
TRACK_GRAD_NORM: False
BAD_SAMPLE_LOG_INTERVAL: 1000
PIN_MEM: True
CUDNN_BENCHMARK: True
CUDNN_DETERMINISTIC: False
