# Network
MODEL_USE: mcan_convmixer_e2e

# Language-fusion backbone
LAYER: 6
HIDDEN_SIZE: 512
FF_SIZE: 2048
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 1024

# End-to-end image branch
USE_RAW_IMAGE_INPUT: True
RAW_IMAGE_INPUT_SIZE: 224
RAW_IMAGE_MEAN: [0.485, 0.456, 0.406]
RAW_IMAGE_STD: [0.229, 0.224, 0.225]
CMX_MODEL_NAME: convmixer_768_32
CMX_PRETRAINED: True
CMX_TOKEN_MIXER_K: 7
CMX_GRAD_CHECKPOINT: True
CMX_FUSE_POOL_SIZE: 16
VISION_LR_SCALE: 0.1

# Keep VQA bbox branch disabled for this model
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False
SKIP_BAD_FEAT: False

# Execution
BATCH_SIZE: 16
LR_BASE: 0.00005
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 12]
WARMUP_EPOCH: 3
MAX_EPOCH: 24
GRAD_NORM_CLIP: 1.0
GRAD_ACCU_STEPS: 1
LOSS_FUNC: bce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9'}
