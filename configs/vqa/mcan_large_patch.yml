# Network
MODEL_USE: mcan
LAYER: 6
HIDDEN_SIZE: 1024
FF_SIZE: 4096
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 2048
USE_BBOX_FEAT: False

# ConvMixer patch-feature setup
# The extractor pools feature maps to 10x10 tokens => N=100.
# convmixer_768_32 produces C=768 channels.
FEAT_SIZE:
  vqa:
    FRCN_FEAT_SIZE: [100, 768]
    BBOX_FEAT_SIZE: [100, 5]
  gqa:
    FRCN_FEAT_SIZE: [100, 2048]
    GRID_FEAT_SIZE: [49, 2048]
    BBOX_FEAT_SIZE: [100, 5]
  clevr:
    GRID_FEAT_SIZE: [196, 1024]

# Use dedicated ConvMixer features without touching original features.
VQA_FEAT_ROOT: ./data/vqa/feats_convmixer/convmixer_768_32_pool10x10
SKIP_BAD_FEAT: True
MAX_BAD_FEAT_RETRY: 50

# Execution
BATCH_SIZE: 64
LR_BASE: 0.00007 # 0.00005 for train+val+vg->test
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 12]
WARMUP_EPOCH: 3
MAX_EPOCH: 13
GRAD_NORM_CLIP: -1
GRAD_ACCU_STEPS: 2 # to reduce GPU memory cost
LOSS_FUNC: bce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9'}
