MODEL_USE: mcan_lvprune
LAYER: 6
HIDDEN_SIZE: 1024
FF_SIZE: 4096
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 2048
USE_BBOX_FEAT: False

FEAT_SIZE:
  vqa:
    FRCN_FEAT_SIZE: [100, 768]
    BBOX_FEAT_SIZE: [100, 5]
  gqa:
    FRCN_FEAT_SIZE: [100, 2048]
    GRID_FEAT_SIZE: [49, 2048]
    BBOX_FEAT_SIZE: [100, 5]
  clevr:
    GRID_FEAT_SIZE: [196, 1024]

VQA_FEAT_ROOT: ./data/vqa/feats_convmixer/convmixer_768_32_pool10x10
SKIP_BAD_FEAT: True
MAX_BAD_FEAT_RETRY: 50

PRUNE_LAYER_RATIOS: [1.0, 1.0, 0.95, 0.85, 0.75, 0.65]
PRUNE_LAMBDA: 0.05
PRUNE_GUMBEL_TAU: 1.0
PRUNE_INIT_CKPT: ''
FREEZE_BACKBONE: False
PRUNE_TRAIN_NAME_SUBSTR: lv_gate

BATCH_SIZE: 64
LR_BASE: 0.00007
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 12]
WARMUP_EPOCH: 3
MAX_EPOCH: 13
GRAD_NORM_CLIP: -1
GRAD_ACCU_STEPS: 2
LOSS_FUNC: bce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9'}
