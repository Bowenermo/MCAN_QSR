# MCAN + language-guided visual token pruning (BUA region npz, 2048-D)
MODEL_USE: mcan_lvprune
LAYER: 6
HIDDEN_SIZE: 512
FF_SIZE: 2048
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 1024
USE_BBOX_FEAT: False

# One target keep-ratio per decoder layer (length == LAYER). 1.0 = no gate at that layer.
PRUNE_LAYER_RATIOS: [1.0, 1.0, 0.95, 0.85, 0.75, 0.65]
PRUNE_LAMBDA: 0.05
PRUNE_GUMBEL_TAU: 1.0
# Optional: path to mcan_small baseline .pkl (leave empty to train from scratch)
PRUNE_INIT_CKPT: ''
FREEZE_BACKBONE: False
PRUNE_TRAIN_NAME_SUBSTR: lv_gate

# Execution
BATCH_SIZE: 64
LR_BASE: 0.0001
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 12]
WARMUP_EPOCH: 3
MAX_EPOCH: 13
GRAD_NORM_CLIP: -1
GRAD_ACCU_STEPS: 1
LOSS_FUNC: bce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9'}
